- name: Auto assign location based on site
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    netbox_url: "{{ lookup('env', 'NETBOX_URL') }}"
    netbox_token: "{{ lookup('env', 'NETBOX_TOKEN') }}"

    site_location_map:
      AUTO-SYNC: floor-4
      DR-HAN-01: floor-1

  tasks:

    # 1. Lấy device từ NetBox (chuẩn, không dùng uri)
    - name: Get devices from NetBox
      set_fact:
        devices: >-
          {{ query('netbox.netbox.nb_lookup', 'devices',
            api_endpoint=netbox_url,
            token=netbox_token,
            validate_certs=False) }}

    # 2. Update location (có kiểm tra để tránh update thừa)
    - name: Assign location based on site
      netbox.netbox.netbox_device:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        validate_certs: false
        data:
          name: "{{ item.value.name }}"
          location: "{{ site_location_map[item.value.site.name] }}"
        state: present
      loop: "{{ devices }}"
      when:
        - item.value.site is defined
        - item.value.site.name in site_location_map
        - item.value.status.value == "active"
        - item.value.location is not defined
          or item.value.location.name != site_location_map[item.value.site.name]

    # 3. Debug log (giúp kiểm tra)
    - name: Show updated devices
      debug:
        msg: "Updated {{ item.value.name }} → {{ site_location_map[item.value.site.name] }}"
      loop: "{{ devices }}"
      when:
        - item.value.site is defined
        - item.value.site.name in site_location_map
